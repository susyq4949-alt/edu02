<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구촌 지리 사전</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --accent-green: #27ae60;
            --ocean-blue: #3498db;
            --bg-light: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* 내비게이션 바 추가 */
        nav {
            background-color: var(--white);
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: flex-start;
        }

        .home-btn {
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .home-btn:hover {
            background-color: #eee;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--primary-blue), var(--ocean-blue));
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2.2rem; }
        p.subtitle { opacity: 0.9; margin-top: 10px; }

        .section-title {
            border-left: 5px solid var(--accent-green);
            padding-left: 15px;
            margin: 40px 0 20px;
            color: var(--primary-blue);
            font-size: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--ocean-blue);
            font-size: 1.2rem;
        }

        .content {
            display: none;
            font-size: 0.95rem;
            color: #555;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }

        .card.active {
            border-color: var(--accent-green);
            background-color: #f9fffb;
        }

        .card.active .content {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .tag {
            display: inline-block;
            background: #eef2f3;
            color: #555;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<!-- 홈 버튼이 포함된 내비게이션 바 -->
<nav>
    <a href="../index.html" class="home-btn">🏠 홈으로 이동</a>
</nav>

<div class="container">
    <header>
        <h1>🌍 지구촌 지리 사전</h1>
        <p class="subtitle">대륙과 대양, 기초 지리 용어를 쉽고 재미있게 배워보세요!</p>
    </header>

    <section>
        <h2 class="section-title">📍 기초 지리 용어</h2>
        <div class="grid" id="basic-terms"></div>
    </section>

    <section>
        <h2 class="section-title">🗺️ 세계의 7대륙</h2>
        <div class="grid" id="continents"></div>
    </section>

    <section>
        <h2 class="section-title">🌊 세계의 5대양</h2>
        <div class="grid" id="oceans"></div>
    </section>
</div>

<script>
    const data = {
        basic: [
            { title: "대륙", desc: "바다로 둘러싸인 거대한 육지입니다. 대양이나 우랄산맥 같은 높은 산맥을 기준으로 나눕니다.", emoji: "⛰️" },
            { title: "대양", desc: "지구상의 매우 넓고 깊은 바다를 의미합니다.", emoji: "🌊" },
            { title: "위선과 경선", desc: "지구본 위에서 위치를 정확히 나타내기 위해 가상으로 그은 가로세로 선입니다.", emoji: "🌐" },
            { title: "적도", desc: "위도 0° 선으로, 지구를 북반구와 남반구로 나누는 기준이 됩니다.", emoji: "🔴" }
        ],
        continents: [
            { title: "아시아", desc: "세계에서 가장 면적이 넓으며 인구도 가장 많습니다. 대부분 북반구에 위치합니다.", tag: "최대 면적" },
            { title: "아프리카", desc: "아시아 다음으로 넓으며, 세계에서 가장 많은 국가가 속해 있습니다.", tag: "최다 국가" },
            { title: "북아메리카", desc: "세 번째로 큰 대륙으로, 그린란드와 같은 거대한 섬을 포함합니다.", tag: "그린란드 포함" },
            { title: "남아메리카", desc: "대부분 남반구에 있으며, 세계에서 가장 긴 안데스 산맥이 흐릅니다.", tag: "안데스 산맥" },
            { title: "유럽", desc: "아시아 서쪽에 위치하며, 크기는 작지만 정치·문화적으로 다양한 나라가 모여 있습니다.", tag: "서쪽 끝" },
            { title: "오세아니아", desc: "세계에서 가장 작은 대륙으로 호주와 주변 섬들을 포함합니다.", tag: "최소 대륙" },
            { title: "남극 대륙", desc: "지구 최남단의 대륙으로 대부분이 두꺼운 얼음으로 덮여 있습니다.", tag: "빙하 지대" }
        ],
        oceans: [
            { title: "태평양", desc: "지구에서 가장 넓고 깊은 바다로 전체 바다 면적의 약 절반을 차지합니다.", emoji: "🔵" },
            { title: "대서양", desc: "아메리카 대륙과 유럽, 아프리카 대륙 사이에 있는 큰 바다입니다.", emoji: "🔵" },
            { title: "인도양", desc: "아시아, 아프리카, 오세아니아 사이에 위치한 바다입니다.", emoji: "🔵" },
            { title: "북극해", desc: "지구 북극 주변에 있는 바다로 대부분 얼음으로 덮여 있습니다.", emoji: "❄️" },
            { title: "남극해", desc: "남극 대륙을 둘러싸고 있는 차가운 바다입니다.", emoji: "❄️" }
        ]
    };

    function renderCards(id, list) {
        const wrapper = document.getElementById(id);
        list.forEach(item => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                ${item.tag ? `<span class="tag">${item.tag}</span>` : ''}
                <h3>${item.emoji || '📍'} ${item.title}</h3>
                <div class="content">${item.desc}</div>
            `;
            el.onclick = () => {
                // 클릭 시 해당 카드만 활성화 (다른 카드는 닫히게 하려면 여기에 로직 추가 가능)
                el.classList.toggle('active');
            };
            wrapper.appendChild(el);
        });
    }

    // 데이터 렌더링 실행
    renderCards('basic-terms', data.basic);
    renderCards('continents', data.continents);
    renderCards('oceans', data.oceans);
</script>

</body>
</html>
