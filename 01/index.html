<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7대륙 5대양 탐험</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .continent-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .ocean-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
        .active-tab {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .map-marker {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .map-marker:hover {
            scale: 1.2;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-blue-900 mb-4">🌍 7대륙 5대양 탐험기</h1>
            <p class="text-gray-600 max-w-2xl mx-auto">
                지구의 표면을 구성하는 거대한 육지 '대륙'과 드넓은 바다 '대양'에 대해 알아보세요. 
                버튼을 클릭하여 상세 정보를 확인할 수 있습니다.
            </p>
        </header>

        <div class="flex justify-center gap-4 mb-8">
            <button id="btn-continents" onclick="switchView('continents')" class="active-tab px-6 py-2 rounded-full font-semibold transition-all duration-300">대륙 (7)</button>
            <button id="btn-oceans" onclick="switchView('oceans')" class="bg-white text-blue-600 px-6 py-2 rounded-full font-semibold border border-blue-200 transition-all duration-300">대양 (5)</button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-card rounded-3xl p-6 shadow-xl overflow-hidden relative min-h-[400px] flex items-center justify-center">
                <div class="relative w-full aspect-[2/1] bg-blue-50 rounded-2xl border-2 border-blue-100 overflow-hidden">
                    <!-- Stylized World Map Background (Simple SVG) -->
                    <svg viewBox="0 0 1000 500" class="w-full h-full opacity-20 fill-blue-300">
                        <path d="M150,150 Q200,100 300,120 T450,150 T600,100 T800,130 L850,300 Q750,400 600,380 T400,420 T150,350 Z" />
                        <path d="M200,400 Q300,450 400,400 T500,450 L450,480 L250,480 Z" />
                    </svg>

                    <!-- Interactive Points (Continents) -->
                    <div id="marker-layer" class="absolute inset-0">
                        <!-- Points will be generated by JS -->
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div id="info-panel" class="glass-card rounded-3xl p-8 shadow-xl h-full flex flex-col justify-center border-t-4 border-blue-500">
                    <div id="info-empty" class="text-center text-gray-400">
                        <div class="text-6xl mb-4">📍</div>
                        <p class="text-lg">왼쪽의 지점이나 아래 목록에서<br>항목을 선택해 주세요.</p>
                    </div>
                    <div id="info-content" class="hidden fade-in">
                        <span id="info-category" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 bg-blue-100 text-blue-600">Continent</span>
                        <h2 id="info-title" class="text-3xl font-bold text-gray-800 mb-4">아시아</h2>
                        <div id="info-desc" class="text-gray-600 leading-relaxed mb-6">
                            세계에서 가장 넓은 대륙으로, 대부분 북반구에 분포해 있습니다.
                        </div>
                        <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                            <p id="info-fact" class="text-sm text-blue-800 font-medium italic"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="selection-list" class="mt-12 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
            <!-- Buttons dynamically generated here -->
        </div>

        <footer class="mt-16 text-center text-gray-500 text-sm border-t border-gray-200 pt-8">
            &copy; 2024 지구 지리 가이드 - 7대륙 5대양
        </footer>
    </div>

    <script>
        const data = {
            continents: [
                { id: 'asia', name: '아시아', icon: '🌏', desc: '세계에서 가장 넓은 대륙으로, 인구가 가장 많으며 대부분 북반구에 분포해 있습니다.', fact: '에베레스트 산 등 세계에서 가장 높은 산맥들이 위치해 있습니다.', x: 75, y: 35 },
                { id: 'africa', name: '아프리카', icon: '🦁', desc: '유럽의 남쪽에 위치하며, 아시아 다음으로 넓은 대륙이자 가장 많은 나라가 속해 있습니다.', fact: '세계에서 가장 긴 나일강과 가장 넓은 사하라 사막이 있습니다.', x: 52, y: 55 },
                { id: 'namerica', name: '북아메리카', icon: '🦅', desc: '세 번째로 큰 대륙이며, 세계에서 가장 큰 섬인 그린란드를 포함하고 있습니다.', fact: '미국, 캐나다, 멕시코 등 거대 국가들이 위치한 경제적 중심지입니다.', x: 22, y: 30 },
                { id: 'samerica', name: '남아메리카', icon: '🦜', desc: '대부분 남반구에 속해 있으며, 세계에서 가장 긴 산맥인 안데스산맥과 아마존 열대우림이 있습니다.', fact: '안데스 산맥은 남북으로 약 7,000km에 걸쳐 뻗어 있습니다.', x: 32, y: 70 },
                { id: 'europe', name: '유럽', icon: '🏰', desc: '우랄산맥을 경계로 아시아의 서쪽에 위치해 있으며, 작은 대륙이지만 많은 선진국들이 모여 있습니다.', fact: '세계에서 두 번째로 작은 대륙이지만 역사적 영향력이 큽니다.', x: 51, y: 28 },
                { id: 'oceania', name: '오세아니아', icon: '🦘', desc: '세계에서 가장 작은 대륙으로, 대부분 남반구에 분포해 있으며 호주와 주변 섬들로 구성됩니다.', fact: '동물들의 천국이라 불릴 만큼 독특한 생태계를 가지고 있습니다.', x: 85, y: 75 },
                { id: 'antarctica', name: '남극 대륙', icon: '🐧', desc: '지구의 최남단에 위치하며 아시아, 북아메리카와 함께 7대륙 중 하나로 포함됩니다.', fact: '지구상에서 가장 춥고 건조하며 바람이 강한 곳입니다.', x: 50, y: 92 }
            ],
            oceans: [
                { id: 'pacific', name: '태평양', icon: '🌊', desc: '지구상에서 가장 넓고 깊은 바다로, 아시아와 아메리카 대륙 사이에 위치합니다.', fact: '지구 표면적의 약 3분의 1을 차지할 만큼 광대합니다.', x: 10, y: 50 },
                { id: 'atlantic', name: '대서양', icon: '🛳️', desc: '아메리카 대륙과 유럽, 아프리카 대륙 사이에 있는 두 번째로 큰 대양입니다.', fact: '과거부터 신대륙과 구대륙을 잇는 중요한 항로 역할을 했습니다.', x: 42, y: 45 },
                { id: 'indian', name: '인도양', icon: '🐠', desc: '아프리카, 아시아, 호주 대륙에 둘러싸인 세계에서 세 번째로 큰 바다입니다.', fact: '해양 생물 자원이 매우 풍부한 따뜻한 바다입니다.', x: 68, y: 65 },
                { id: 'arctic', name: '북극해', icon: '❄️', desc: '북극 주변에 위치한 바다로, 5대양 중 가장 작고 얕으며 대부분 얼음으로 덮여 있습니다.', fact: '기후 변화에 따른 빙하 감소가 가장 뚜렷하게 관찰되는 곳입니다.', x: 50, y: 5 },
                { id: 'southern', name: '남극해', icon: '⚓', desc: '남극 대륙을 둘러싸고 있는 거대한 바다로, 한랭한 기후와 강한 파도가 특징입니다.', fact: '남극 순환류가 흐르며 지구의 기온 조절에 중요한 역할을 합니다.', x: 50, y: 82 }
            ]
        };

        let currentView = 'continents';

        function switchView(view) {
            currentView = view;
            
            // Update buttons
            document.getElementById('btn-continents').className = view === 'continents' ? 'active-tab px-6 py-2 rounded-full font-semibold transition-all' : 'bg-white text-blue-600 px-6 py-2 rounded-full font-semibold border border-blue-200 transition-all';
            document.getElementById('btn-oceans').className = view === 'oceans' ? 'active-tab px-6 py-2 rounded-full font-semibold transition-all' : 'bg-white text-blue-600 px-6 py-2 rounded-full font-semibold border border-blue-200 transition-all';
            
            renderList();
            renderMarkers();
            resetInfo();
        }

        function renderList() {
            const listContainer = document.getElementById('selection-list');
            listContainer.innerHTML = '';
            
            data[currentView].forEach(item => {
                const btn = document.createElement('button');
                btn.className = `continent-btn glass-card p-4 rounded-2xl flex flex-col items-center gap-2 border-2 border-transparent hover:border-blue-300 transition-all duration-300`;
                btn.onclick = () => showDetail(item);
                btn.innerHTML = `
                    <span class="text-3xl">${item.icon}</span>
                    <span class="font-bold text-gray-700 text-sm whitespace-nowrap">${item.name}</span>
                `;
                listContainer.appendChild(btn);
            });
        }

        function renderMarkers() {
            const markerLayer = document.getElementById('marker-layer');
            markerLayer.innerHTML = '';
            
            data[currentView].forEach(item => {
                const marker = document.createElement('button');
                marker.className = 'map-marker absolute w-8 h-8 md:w-10 md:h-10 bg-white rounded-full shadow-lg border-2 border-blue-500 flex items-center justify-center text-lg z-10';
                marker.style.left = `${item.x}%`;
                marker.style.top = `${item.y}%`;
                marker.style.transform = 'translate(-50%, -50%)';
                marker.innerHTML = item.icon;
                marker.onclick = () => showDetail(item);
                marker.title = item.name;
                markerLayer.appendChild(marker);
            });
        }

        function showDetail(item) {
            document.getElementById('info-empty').classList.add('hidden');
            const content = document.getElementById('info-content');
            content.classList.remove('hidden');
            content.classList.add('fade-in');
            
            document.getElementById('info-category').innerText = currentView === 'continents' ? 'Continent' : 'Ocean';
            document.getElementById('info-title').innerText = `${item.icon} ${item.name}`;
            document.getElementById('info-desc').innerText = item.desc;
            document.getElementById('info-fact').innerText = `✨ 상식: ${item.fact}`;
            
            // Animation reset
            setTimeout(() => content.classList.remove('fade-in'), 500);
        }

        function resetInfo() {
            document.getElementById('info-empty').classList.remove('hidden');
            document.getElementById('info-content').classList.add('hidden');
        }

        window.onload = () => {
            switchView('continents');
        };
    </script>
</body>
</html>
